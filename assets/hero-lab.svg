<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 450" fill="none">
  <defs>
    <linearGradient id="hg1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#990000"/><stop offset="100%" stop-color="#d32f2f"/></linearGradient>
    <linearGradient id="hg2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1a1a2e"/><stop offset="100%" stop-color="#141414"/></linearGradient>
    <linearGradient id="hg3" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1565C0"/><stop offset="100%" stop-color="#1E88E5"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="6" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="shadow"><feDropShadow dx="0" dy="8" stdDeviation="12" flood-opacity="0.15"/></filter>
  </defs>
  <!-- Circuit lines background -->
  <g opacity="0.08">
    <line x1="50" y1="0" x2="50" y2="450" stroke="#990000" stroke-width="1"/><line x1="120" y1="0" x2="120" y2="450" stroke="#990000" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="450" stroke="#990000" stroke-width="1"/><line x1="300" y1="0" x2="300" y2="450" stroke="#990000" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="450" stroke="#990000" stroke-width="1"/><line x1="0" y1="80" x2="500" y2="80" stroke="#990000" stroke-width="1"/>
    <line x1="0" y1="180" x2="500" y2="180" stroke="#990000" stroke-width="1"/><line x1="0" y1="280" x2="500" y2="280" stroke="#990000" stroke-width="1"/>
    <line x1="0" y1="370" x2="500" y2="370" stroke="#990000" stroke-width="1"/>
  </g>
  <!-- Glowing orbs -->
  <circle cx="380" cy="100" r="80" fill="#990000" opacity="0.06"/>
  <circle cx="120" cy="350" r="100" fill="#d32f2f" opacity="0.05"/>
  <!-- Server Rack -->
  <g transform="translate(340,110)" filter="url(#shadow)">
    <rect x="0" y="0" width="90" height="220" rx="8" fill="url(#hg2)" stroke="rgba(153,0,0,0.15)" stroke-width="1"/>
    <rect x="12" y="12" width="66" height="22" rx="4" fill="#1a1a2e" stroke="rgba(153,0,0,0.1)" stroke-width="0.5"/>
    <circle cx="68" cy="23" r="3" fill="#00c853" opacity="0.8"/>
    <rect x="12" y="42" width="66" height="22" rx="4" fill="#1a1a2e" stroke="rgba(153,0,0,0.1)" stroke-width="0.5"/>
    <circle cx="68" cy="53" r="3" fill="#00c853" opacity="0.6"/>
    <rect x="12" y="72" width="66" height="22" rx="4" fill="#1a1a2e" stroke="rgba(153,0,0,0.1)" stroke-width="0.5"/>
    <circle cx="68" cy="83" r="3" fill="#00c853" opacity="0.4"/>
    <rect x="12" y="102" width="66" height="22" rx="4" fill="rgba(153,0,0,0.08)" stroke="rgba(153,0,0,0.15)" stroke-width="0.5"/>
    <circle cx="68" cy="113" r="3" fill="#ffc107"/>
    <rect x="12" y="132" width="66" height="22" rx="4" fill="#1a1a2e" stroke="rgba(153,0,0,0.1)" stroke-width="0.5"/>
    <rect x="12" y="162" width="66" height="22" rx="4" fill="#1a1a2e" stroke="rgba(153,0,0,0.1)" stroke-width="0.5"/>
    <rect x="12" y="192" width="66" height="18" rx="4" fill="rgba(153,0,0,0.05)" stroke="rgba(153,0,0,0.1)" stroke-width="0.5"/>
  </g>
  <!-- Monitor -->
  <g transform="translate(180,95)" filter="url(#shadow)">
    <rect x="0" y="0" width="130" height="90" rx="10" fill="url(#hg2)" stroke="rgba(153,0,0,0.12)" stroke-width="1"/>
    <rect x="8" y="6" width="114" height="72" rx="6" fill="#0a0a1a"/>
    <!-- Screen content -->
    <rect x="16" y="14" width="98" height="2" rx="1" fill="rgba(153,0,0,0.12)"/>
    <rect x="16" y="22" width="50" height="2" rx="1" fill="rgba(153,0,0,0.08)"/>
    <rect x="16" y="30" width="70" height="2" rx="1" fill="rgba(153,0,0,0.08)"/>
    <rect x="16" y="38" width="35" height="2" rx="1" fill="rgba(153,0,0,0.08)"/>
    <rect x="16" y="50" width="98" height="18" rx="3" fill="rgba(153,0,0,0.06)"/>
    <rect x="16" y="50" width="25" height="18" rx="3" fill="url(#hg1)" opacity="0.3"/>
    <rect x="46" y="50" width="25" height="18" rx="3" fill="rgba(33,150,243,0.15)"/>
    <rect x="76" y="50" width="38" height="18" rx="3" fill="rgba(0,200,83,0.1)"/>
    <circle cx="112" cy="78" r="2" fill="#00c853"/>
  </g>
  <rect x="243" y="185" width="6" height="30" rx="3" fill="rgba(20,20,20,0.6)"/>
  <rect x="237" y="215" width="18" height="6" rx="3" fill="rgba(20,20,20,0.4)"/>
  <!-- Floating icon nodes -->
  <g filter="url(#glow)">
    <rect x="170" y="50" width="36" height="36" rx="8" fill="url(#hg1)"/>
    <path d="M185 62v12M179 68h12" stroke="white" stroke-width="2" stroke-linecap="round"/>
  </g>
  <g filter="url(#glow)">
    <rect x="295" y="200" width="36" height="36" rx="8" fill="url(#hg3)"/>
    <rect x="303" y="210" width="20" height="4" rx="1" fill="white" opacity="0.8"/>
    <rect x="303" y="218" width="14" height="4" rx="1" fill="white" opacity="0.6"/>
    <rect x="303" y="226" width="8" height="4" rx="1" fill="white" opacity="0.4"/>
  </g>
  <!-- Floating database icon -->
  <g filter="url(#glow)">
    <rect x="135" y="270" width="38" height="38" rx="9" fill="linear-gradient(135deg,#2E7D32,#43A047)"/>
    <ellipse cx="154" cy="283" rx="12" ry="4" stroke="white" stroke-width="1.5" fill="none"/>
    <line x1="142" y1="283" x2="142" y2="296" stroke="white" stroke-width="1.5"/>
    <line x1="166" y1="283" x2="166" y2="296" stroke="white" stroke-width="1.5"/>
    <ellipse cx="154" cy="296" rx="12" ry="4" stroke="white" stroke-width="1.5" fill="none"/>
  </g>
  <!-- Wireless signal arcs -->
  <g opacity="0.12" transform="translate(260,280)">
    <path d="M-30 10 Q0-15 30 10" stroke="#990000" stroke-width="2" fill="none"/>
    <path d="M-45 0 Q0-30 45 0" stroke="#990000" stroke-width="2" fill="none"/>
    <path d="M-60-10 Q0-45 60-10" stroke="#990000" stroke-width="2" fill="none"/>
  </g>
  <!-- Bottom decorative circuit nodes -->
  <circle cx="80" cy="400" r="4" fill="#990000" opacity="0.15"/>
  <circle cx="160" cy="420" r="3" fill="#d32f2f" opacity="0.1"/>
  <circle cx="420" cy="390" r="5" fill="#990000" opacity="0.12"/>
  <circle cx="450" cy="410" r="3" fill="#d32f2f" opacity="0.08"/>
  <!-- Connection lines -->
  <line x1="310" y1="170" x2="340" y2="110" stroke="#990000" stroke-width="0.5" opacity="0.15"/>
  <line x1="240" y1="185" x2="180" y2="140" stroke="#990000" stroke-width="0.5" opacity="0.12"/>
</svg>
